<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Warm cream background (Anthropic palette) -->
  <rect width="1200" height="630" fill="#F0EEE6"/>

  <!-- Decorative doodle stars scattered -->
  <g fill="none" stroke-linecap="round">
    <!-- Star 1 (top-left) -->
    <g stroke="#D97757" stroke-width="3.5" transform="translate(110, 130)">
      <line x1="0" y1="-22" x2="0" y2="22"/>
      <line x1="-22" y1="0" x2="22" y2="0"/>
      <line x1="-15" y1="-15" x2="15" y2="15"/>
      <line x1="15" y1="-15" x2="-15" y2="15"/>
    </g>
    <!-- Star 2 (top-right) -->
    <g stroke="#826E58" stroke-width="3" transform="translate(1060, 180)">
      <line x1="0" y1="-18" x2="0" y2="18"/>
      <line x1="-18" y1="0" x2="18" y2="0"/>
    </g>
    <!-- Star 3 (bottom-left) -->
    <g stroke="#93A380" stroke-width="3" transform="translate(85, 510)">
      <line x1="0" y1="-16" x2="0" y2="16"/>
      <line x1="-16" y1="0" x2="16" y2="0"/>
      <line x1="-12" y1="-12" x2="12" y2="12"/>
    </g>
    <!-- Star 4 (bottom-right) -->
    <g stroke="#D97757" stroke-width="3.5" transform="translate(1100, 480)">
      <line x1="0" y1="-22" x2="0" y2="22"/>
      <line x1="-22" y1="0" x2="22" y2="0"/>
      <line x1="-16" y1="-16" x2="16" y2="16"/>
      <line x1="16" y1="-16" x2="-16" y2="16"/>
    </g>
    <!-- Wavy squiggle (top decoration) -->
    <path d="M870 90 Q890 78, 910 90 T950 90 T990 90" stroke="#D97757" stroke-width="3" fill="none"/>
    <!-- Dots cluster -->
    <circle cx="180" cy="380" r="4" fill="#826E58"/>
    <circle cx="200" cy="395" r="3" fill="#826E58"/>
    <circle cx="195" cy="365" r="3.5" fill="#826E58"/>
  </g>

  <!-- Center: hand-drawn fork doodle -->
  <g transform="translate(548, 130)" fill="none" stroke="#D97757" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <!-- 4 prongs -->
    <path d="M0 0 C-1 14, 1 32, -2 46"/>
    <path d="M30 -2 C31 14, 30 32, 29 48"/>
    <path d="M60 0 C61 14, 60 32, 58 46"/>
    <path d="M90 -2 C91 14, 90 32, 89 48"/>
    <!-- Base -->
    <path d="M-7 46 C18 54, 70 56, 96 45"/>
    <!-- Handle -->
    <path d="M40 52 C42 88, 48 124, 44 158"/>
  </g>

  <!-- Sparkle pada fork -->
  <g stroke="#1F1F1E" stroke-width="4" stroke-linecap="round">
    <line x1="700" y1="155" x2="700" y2="180"/>
    <line x1="687" y1="167" x2="713" y2="167"/>
    <line x1="691" y1="158" x2="709" y2="176"/>
    <line x1="709" y1="158" x2="691" y2="176"/>
  </g>

  <!-- Title (italic serif) -->
  <text x="600" y="395" font-size="100" font-weight="600" font-style="italic" text-anchor="middle" fill="#1F1F1E"
        font-family="'Source Serif 4', 'Tiempos Headline', Georgia, serif" letter-spacing="-2">MakanApa</text>

  <!-- Hand-drawn underline at title -->
  <path d="M460 425 C500 412, 540 432, 580 422 T660 422 T740 425" stroke="#D97757" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="600" y="475" font-size="30" font-weight="500" text-anchor="middle" fill="#5C5B57"
        font-family="Inter, system-ui, sans-serif">Pertanyaan Terbesar Umat Manusia.</text>

  <!-- Bottom badge row with doodle separator -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="600">
    <text x="600" y="555" font-size="24" text-anchor="middle" fill="#3D3929">🎲 Roll Dadu &nbsp;·&nbsp; 🎡 Spin Wheels &nbsp;·&nbsp; 🎰 Jackpot</text>
  </g>
</svg>
