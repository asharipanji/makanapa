<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Warm cream background -->
  <rect width="192" height="192" rx="42" fill="#F0EEE6"/>

  <!-- Hand-drawn fork doodle (Claude orange) -->
  <g fill="none" stroke="#D97757" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- 4 prongs slightly irregular -->
    <path d="M58 38 C58 52, 60 68, 57 84"/>
    <path d="M81 36 C82 52, 81 70, 79 86"/>
    <path d="M105 36 C106 52, 105 68, 104 84"/>
    <path d="M129 38 C130 52, 130 68, 128 84"/>
    <!-- Fork base, hand-drawn wobble -->
    <path d="M52 84 C70 90, 110 92, 134 83"/>
    <!-- Handle dengan curve organik -->
    <path d="M88 88 C92 112, 96 132, 92 160"/>
  </g>

  <!-- Hand-drawn sparkle / asterisk (Claude signature) -->
  <g fill="none" stroke="#1F1F1E" stroke-width="3.6" stroke-linecap="round">
    <line x1="148" y1="44" x2="148" y2="62"/>
    <line x1="139" y1="53" x2="157" y2="53"/>
    <line x1="142" y1="47" x2="154" y2="59"/>
    <line x1="154" y1="47" x2="142" y2="59"/>
  </g>

  <!-- Tiny dot accent -->
  <circle cx="42" cy="148" r="3" fill="#826E58"/>
  <circle cx="155" cy="135" r="2.5" fill="#93A380"/>
</svg>
